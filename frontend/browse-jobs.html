<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs - Smart Internship & Job Tracker</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">CareerTrack</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link" data-page="dashboard">
                    <span class="nav-icon">📈</span>
                    <span>Dashboard</span>
                </a>
                <a href="browse-jobs.html" class="nav-link active" data-page="browse-jobs">
                    <span class="nav-icon">🔍</span>
                    <span>Browse Jobs</span>
                </a>
                <a href="add.html" class="nav-link" data-page="add">
                    <span class="nav-icon">➕</span>
                    <span>Add Application</span>
                </a>
                <a href="profile.html" class="nav-link" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn">
                    <span class="nav-icon">🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-content">
                <div class="header">
                    <div class="header-title">
                        <h1>Browse Jobs</h1>
                        <p class="header-subtitle">Find and apply to internship opportunities</p>
                    </div>
                </div>

                <!-- Search & Filter Section -->
                <section class="jobs-filter-section">
                    <input type="text" id="job-search" class="search-box" placeholder="Search jobs by company, role, or location...">
                    <select id="company-filter" class="filter-select">
                        <option value="">All Companies</option>
                    </select>
                </section>

                <!-- Jobs Listing -->
                <section class="jobs-listing-section">
                    <div id="jobs-container" class="jobs-container">
                        <!-- Job cards will be loaded here -->
                        <div class="empty-state">
                            <div class="empty-icon">💼</div>
                            <h3>No jobs available</h3>
                            <p>Check back later for new opportunities!</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Job Detail Modal -->
    <div id="job-detail-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-job-title"></h2>
                <button class="modal-close" id="close-job-detail">&times;</button>
            </div>
            <div class="modal-body">
                <div class="job-detail-section">
                    <h3>Job Details</h3>
                    <div class="detail-row">
                        <span class="detail-label">Company:</span>
                        <span id="modal-company" class="detail-value"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Location:</span>
                        <span id="modal-location" class="detail-value"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Salary:</span>
                        <span id="modal-salary" class="detail-value"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Posted Date:</span>
                        <span id="modal-posted-date" class="detail-value"></span>
                    </div>
                </div>

                <div class="job-detail-section">
                    <h3>Description</h3>
                    <p id="modal-description"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="close-job-detail-btn">Close</button>
                <button type="button" class="btn btn-primary" id="apply-job-btn">Apply Now</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize browse jobs page
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuthAndRole()) return;
            if (!checkRoleAccess()) return;
            
            setupDynamicSidebar();
            displayUserRole();
            initializeBrowseJobsPage();
        });
    </script>
</body>
</html>
