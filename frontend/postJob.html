<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Job - Smart Internship Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.5em;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .form-card {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .form-card h2 {
      color: #333;
      margin-bottom: 30px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    button.secondary {
      background: #999;
    }

    button.secondary:hover {
      background: #777;
    }

    .message {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button-group button {
      margin: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Post New Job/Internship</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      Back to Dashboard
    </button>
  </header>

  <div class="container">
    <div class="form-card">
      <h2>Create New Job Posting</h2>

      <div id="message" class="message"></div>

      <form id="postJobForm">
        <div class="form-group">
          <label for="title">Job Title:</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="e.g., Frontend Developer Internship"
            required
          />
        </div>

        <div class="form-group">
          <label for="company">Company Name:</label>
          <input
            type="text"
            id="company"
            name="company"
            placeholder="Enter your company name"
            required
          />
        </div>

        <div class="form-group">
          <label for="jobType">Job Type:</label>
          <select id="jobType" name="jobType" required>
            <option value="">Select job type</option>
            <option value="internship">Internship</option>
            <option value="job">Full-Time Job</option>
            <option value="contract">Contract</option>
          </select>
        </div>

        <div class="form-group">
          <label for="location">Location:</label>
          <input
            type="text"
            id="location"
            name="location"
            placeholder="e.g., New York, USA"
            required
          />
        </div>

        <div class="form-group">
          <label for="salary">Salary/Stipend:</label>
          <input
            type="text"
            id="salary"
            name="salary"
            placeholder="e.g., $5000/month or ₹50,000/month"
          />
        </div>

        <div class="form-group">
          <label for="description">Job Description:</label>
          <textarea
            id="description"
            name="description"
            placeholder="Describe the job, responsibilities, and requirements..."
            required
          ></textarea>
        </div>

        <div id="loading" class="loading">Posting job...</div>

        <div class="button-group">
          <button type="submit">Post Job</button>
          <button type="reset" class="secondary">Clear Form</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Get user from localStorage
    const user = JSON.parse(localStorage.getItem('user'));

    // Check if user is logged in and is a recruiter
    if (!user || user.userType !== 'recruiter') {
      alert('Only recruiters can post jobs. Please login as a recruiter.');
      window.location.href = 'login.html';
    }

    // Handle form submission
    document.getElementById('postJobForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const company = document.getElementById('company').value;
      const jobType = document.getElementById('jobType').value;
      const location = document.getElementById('location').value;
      const salary = document.getElementById('salary').value;
      const description = document.getElementById('description').value;

      const messageDiv = document.getElementById('message');
      const loading = document.getElementById('loading');

      // Show loading
      loading.style.display = 'block';
      messageDiv.style.display = 'none';

      try {
        // Make API call to post job
        const response = await fetch('http://localhost:3000/api/jobs', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            title,
            company,
            jobType,
            location,
            salary,
            description,
            recruiterId: user.id, // Add recruiter ID from logged-in user
          }),
        });

        loading.style.display = 'none';

        const data = await response.json();

        if (response.ok) {
          messageDiv.className = 'message success';
          messageDiv.textContent = 'Job posted successfully! Redirecting...';
          messageDiv.style.display = 'block';

          // Clear form
          document.getElementById('postJobForm').reset();

          // Redirect to dashboard after 2 seconds
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 2000);
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.error || 'Failed to post job. Please try again.';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        loading.style.display = 'none';
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Server error. Please check if the backend is running.';
        messageDiv.style.display = 'block';
        console.error('Error:', error);
      }
    });
  </script>
</body>
</html>
