<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Detail - Company Dashboard</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">CareerTrack</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link" data-page="dashboard">
                    <span class="nav-icon">📈</span>
                    <span>Dashboard</span>
                </a>
                <a href="add.html" class="nav-link" data-page="add">
                    <span class="nav-icon">➕</span>
                    <span>Add Application</span>
                </a>
                <a href="profile.html" class="nav-link" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
                <a href="company.html" class="nav-link active" data-page="company">
                    <span class="nav-icon">🏢</span>
                    <span>Company Dashboard</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn">
                    <span class="nav-icon">🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-content">
                <div class="header">
                    <div class="header-title">
                        <h1 id="applicant-full-name">Applicant Details</h1>
                        <p class="header-subtitle" id="applicant-position-name"></p>
                    </div>
                    <div class="header-action">
                        <a href="company.html" class="btn btn-secondary">← Back</a>
                    </div>
                </div>

                <!-- Applicant Info -->
                <div class="applicant-detail-container">
                    <div class="card applicant-info-card">
                        <div class="applicant-header">
                            <div class="applicant-avatar">👤</div>
                            <div class="applicant-title">
                                <h2 id="applicant-name"></h2>
                                <span class="badge" id="applicant-status-badge"></span>
                            </div>
                            <div class="applicant-contact">
                                <p><strong>Email:</strong> <span id="applicant-email"></span></p>
                                <p><strong>Phone:</strong> <span id="applicant-phone"></span></p>
                            </div>
                        </div>

                        <div class="applicant-details">
                            <div class="detail-row">
                                <div class="detail-label">Applied For</div>
                                <div class="detail-value" id="applicant-job-title"></div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Applied On</div>
                                <div class="detail-value" id="applicant-applied-date"></div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Current Status</div>
                                <div class="detail-value" id="applicant-current-status"></div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Skills</div>
                                <div class="detail-value skills-list" id="applicant-skills"></div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Cover Letter</div>
                                <div class="detail-value" id="applicant-cover-letter">No cover letter provided</div>
                            </div>
                        </div>
                    </div>

                    <!-- Status Pipeline -->
                    <div class="card status-pipeline">
                        <h3>Hiring Pipeline</h3>
                        <div class="pipeline-stages">
                            <div class="pipeline-stage" data-status="Applied">
                                <div class="stage-icon">📋</div>
                                <div class="stage-label">Applied</div>
                            </div>
                            <div class="pipeline-arrow">→</div>
                            <div class="pipeline-stage" data-status="Shortlisted">
                                <div class="stage-icon">⭐</div>
                                <div class="stage-label">Shortlisted</div>
                            </div>
                            <div class="pipeline-arrow">→</div>
                            <div class="pipeline-stage" data-status="Interview">
                                <div class="stage-icon">🎤</div>
                                <div class="stage-label">Interview</div>
                            </div>
                            <div class="pipeline-arrow">→</div>
                            <div class="pipeline-stage" data-status="Offer">
                                <div class="stage-icon">🎉</div>
                                <div class="stage-label">Offer</div>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="card action-card">
                        <h3>Actions</h3>
                        <div class="action-buttons-group">
                            <button class="btn btn-primary" id="move-to-next-btn">Move to Next Stage</button>
                            <button class="btn btn-secondary" id="send-message-btn">Send Message</button>
                            <button class="btn btn-danger" id="reject-applicant-btn">Reject Applicant</button>
                        </div>
                    </div>

                    <!-- Notes Section -->
                    <div class="card notes-card">
                        <h3>Internal Notes</h3>
                        <div class="notes-section">
                            <textarea id="applicant-notes" placeholder="Add internal notes about this candidate..." rows="4"></textarea>
                            <button class="btn btn-secondary" id="save-notes-btn">Save Notes</button>
                        </div>
                        <div id="notes-list" class="notes-list"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
