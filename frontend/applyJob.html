<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Job - Smart Internship Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.5em;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .section {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .section h2 {
      color: #333;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .job-details {
      color: #666;
      line-height: 1.8;
    }

    .job-details strong {
      color: #333;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    button.secondary {
      background: #999;
    }

    button.secondary:hover {
      background: #777;
    }

    .message {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
    }

    .empty-state {
      background: #f0f0f0;
      padding: 40px;
      border-radius: 8px;
      text-align: center;
      color: #666;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Apply for Job</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      Back to Dashboard
    </button>
  </header>

  <div class="container">
    <!-- Job Details Section -->
    <div class="section">
      <h2>Job Details</h2>
      <div id="jobDetails" class="job-details">
        <div class="loading">Loading job details...</div>
      </div>
    </div>

    <!-- Application Form Section -->
    <div class="section">
      <h2>Your Application</h2>

      <div id="message" class="message"></div>

      <form id="applyForm">
        <div class="form-group">
          <label for="resume">Resume/Profile:</label>
          <textarea
            id="resume"
            name="resume"
            placeholder="Paste your resume or profile information here..."
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="coverLetter">Cover Letter (Optional):</label>
          <textarea
            id="coverLetter"
            name="coverLetter"
            placeholder="Tell us why you're interested in this position..."
          ></textarea>
        </div>

        <div id="loading" class="loading">Submitting application...</div>

        <div>
          <button type="submit">Submit Application</button>
          <button type="reset" class="secondary">Clear Form</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Get user from localStorage
    const user = JSON.parse(localStorage.getItem('user'));

    // Check if user is logged in and is a student
    if (!user || user.userType !== 'student') {
      alert('Only students can apply for jobs. Please login as a student.');
      window.location.href = 'login.html';
    }

    // Get jobId from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const jobId = urlParams.get('jobId') || prompt('Enter Job ID:');

    if (!jobId) {
      alert('No job selected. Please select a job first.');
      window.location.href = 'dashboard.html';
    }

    // Load job details
    async function loadJobDetails() {
      try {
        const response = await fetch(`http://localhost:3000/api/jobs/${jobId}`);
        const job = await response.json();

        if (job && job.id) {
          document.getElementById('jobDetails').innerHTML = `
            <strong>Title:</strong> ${job.title}
            <strong>Company:</strong> ${job.company}
            <strong>Duration:</strong> ${job.duration || 'Not specified'}
            <strong>Location:</strong> ${job.location}
            <strong>Stipend:</strong> ${job.stipend || 'Not specified'}
            <strong>Description:</strong>
            <p>${job.description}</p>
            <strong>Skills Required:</strong> ${Array.isArray(job.skills) ? job.skills.join(', ') : 'Not specified'}
            <strong>Posted:</strong> ${job.postedDate || 'N/A'}
            <strong>Deadline:</strong> ${job.deadline || 'N/A'}
            <strong>Applications:</strong> ${job.applicationsCount || 0}
          `;
        } else {
          document.getElementById('jobDetails').innerHTML =
            '<div class="empty-state">Job not found.</div>';
        }
      } catch (error) {
        document.getElementById('jobDetails').innerHTML =
          '<div class="empty-state">Error loading job details.</div>';
        console.error('Error:', error);
      }
    }

    // Load job details on page load
    loadJobDetails();

    // Pre-fill resume if available
    if (user.resume) {
      document.getElementById('resume').value = user.resume;
    }

    // Handle form submission
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const resume = document.getElementById('resume').value;
      const coverLetter = document.getElementById('coverLetter').value;

      const messageDiv = document.getElementById('message');
      const loading = document.getElementById('loading');

      // Show loading
      loading.style.display = 'block';
      messageDiv.style.display = 'none';

      try {
        // Make API call to submit application
        const response = await fetch('http://localhost:3000/api/applications', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            jobId: parseFloat(jobId),
            studentId: user.id,
            resume,
            coverLetter,
          }),
        });

        loading.style.display = 'none';

        const data = await response.json();

        if (response.ok) {
          messageDiv.className = 'message success';
          messageDiv.textContent = 'Application submitted successfully! Redirecting...';
          messageDiv.style.display = 'block';

          // Redirect to dashboard after 2 seconds
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 2000);
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.error || 'Failed to submit application. Please try again.';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        loading.style.display = 'none';
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Server error. Please check if the backend is running.';
        messageDiv.style.display = 'block';
        console.error('Error:', error);
      }
    });
  </script>
</body>
</html>
