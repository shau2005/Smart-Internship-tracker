<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Smart Internship Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-content {
      flex: 1;
    }

    .header-content h1 {
      font-size: 1.8em;
      margin-bottom: 5px;
    }

    .user-info {
      font-size: 0.9em;
      opacity: 0.95;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 20px;
      border: 1px solid white;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .action-btn {
      background: white;
      padding: 25px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .action-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      border-color: #667eea;
    }

    .action-btn h3 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .action-btn p {
      color: #666;
      font-size: 0.9em;
    }

    .jobs-section {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .jobs-section h2 {
      color: #333;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .job-card {
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .job-card:hover {
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      border-color: #667eea;
    }

    .job-card h3 {
      color: #333;
      margin-bottom: 8px;
    }

    .job-card .company {
      color: #667eea;
      font-weight: 600;
      font-size: 0.95em;
    }

    .job-card .details {
      color: #666;
      font-size: 0.9em;
      margin-top: 10px;
      line-height: 1.6;
    }

    .job-card .details span {
      display: inline-block;
      margin-right: 20px;
    }

    .job-card .details strong {
      color: #333;
    }

    .job-actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s;
    }

    .btn-apply {
      background: #667eea;
      color: white;
    }

    .btn-apply:hover {
      background: #5568d3;
    }

    .btn-secondary {
      background: #764ba2;
      color: white;
    }

    .btn-secondary:hover {
      background: #653a8a;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 15px;
      }

      .action-buttons {
        grid-template-columns: 1fr;
      }

      .logout-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Smart Internship Tracker</h1>
      <div class="user-info">
        Welcome, <strong id="userName"></strong> (<span id="userType"></span>)
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div class="container">
    <!-- Action Buttons Based on User Type -->
    <div class="action-buttons" id="actionButtons"></div>

    <!-- Jobs/Applications Section -->
    <div class="jobs-section">
      <h2 id="sectionTitle">Available Internships & Jobs</h2>
      <div id="contentArea">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    // Get user from localStorage
    const user = JSON.parse(localStorage.getItem('user'));

    // If no user, redirect to login
    if (!user) {
      window.location.href = 'login.html';
    }

    // Display user info
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userType').textContent = user.userType;

    // Set up action buttons based on user type
    const actionButtonsDiv = document.getElementById('actionButtons');

    if (user.userType === 'student') {
      actionButtonsDiv.innerHTML = `
        <div class="action-btn" onclick="viewMyApplications()">
          <h3>My Applications</h3>
          <p>Check status of your applications</p>
        </div>
        <div class="action-btn" onclick="updateProfile()">
          <h3>Update Profile</h3>
          <p>Update your resume</p>
        </div>
      `;
    } else if (user.userType === 'recruiter') {
      actionButtonsDiv.innerHTML = `
        <div class="action-btn" onclick="window.location.href='postJob.html'">
          <h3>Post Job</h3>
          <p>Post new internship or job opportunity</p>
        </div>
        <div class="action-btn" onclick="viewMyPostings()">
          <h3>My Postings</h3>
          <p>View jobs you've posted</p>
        </div>
        <div class="action-btn" onclick="viewApplications()">
          <h3>Applications</h3>
          <p>Review applications for your jobs</p>
        </div>
      `;
    }

    // Fetch and display appropriate content
    if (user.userType === 'student') {
      loadAvailableJobs();
      document.getElementById('sectionTitle').textContent = 'Available Internships & Jobs';
    } else {
      loadMyJobPostings();
      document.getElementById('sectionTitle').textContent = 'Your Job Postings';
    }

    // Load available jobs for students
    async function loadAvailableJobs() {
      try {
        const response = await fetch('http://localhost:3000/api/jobs');
        const data = await response.json();

        const contentArea = document.getElementById('contentArea');

        if (data.jobs && data.jobs.length > 0) {
          contentArea.innerHTML = data.jobs
            .map(
              (job) => `
            <div class="job-card">
              <h3>${job.title}</h3>
              <p class="company">${job.company}</p>
              <div class="details">
                <span><strong>Duration:</strong> ${job.duration || 'Not specified'}</span>
                <span><strong>Location:</strong> ${job.location}</span>
                <span><strong>Stipend:</strong> ${job.stipend || 'Not specified'}</span>
                <span><strong>Applications:</strong> ${job.applicationsCount || 0}</span>
              </div>
              <p style="margin-top: 10px; color: #666;">${job.description}</p>
              <div class="job-actions">
                <button class="btn btn-apply" onclick="applyForJob(${job.id})">Apply Now</button>
              </div>
            </div>
          `
            )
            .join('');
        } else {
          contentArea.innerHTML = '<div class="empty-state"><p>No jobs available at the moment.</p></div>';
        }
      } catch (error) {
        document.getElementById('contentArea').innerHTML =
          '<div class="empty-state"><p>Error loading jobs. Please try again.</p></div>';
        console.error('Error:', error);
      }
    }

    // Load recruiter's job postings
    async function loadMyJobPostings() {
      try {
        const response = await fetch(
          `http://localhost:3000/api/jobs/recruiter/${user.id}`
        );
        const data = await response.json();

        const contentArea = document.getElementById('contentArea');

        if (data.jobs && data.jobs.length > 0) {
          contentArea.innerHTML = data.jobs
            .map(
              (job) => `
            <div class="job-card">
              <h3>${job.title}</h3>
              <p class="company">${job.company}</p>
              <div class="details">
                <span><strong>Duration:</strong> ${job.duration || 'Not specified'}</span>
                <span><strong>Location:</strong> ${job.location}</span>
                <span><strong>Stipend:</strong> ${job.stipend || 'Not specified'}</span>
                <span><strong>Applications:</strong> ${job.applicationsCount || 0}</span>
              </div>
              <p style="margin-top: 10px; color: #666;">${job.description}</p>
              <div class="job-actions">
                <button class="btn btn-secondary" onclick="viewJobApplications(${job.id})">View Applications</button>
              </div>
            </div>
          `
            )
            .join('');
        } else {
          contentArea.innerHTML =
            '<div class="empty-state"><p>You haven\'t posted any jobs yet.  <a href="postJob.html" style="color: #667eea; cursor: pointer;">Post your first job</a></p></div>';
        }
      } catch (error) {
        document.getElementById('contentArea').innerHTML =
          '<div class="empty-state"><p>Error loading your postings.</p></div>';
        console.error('Error:', error);
      }
    }

    // Apply for a job
    function applyForJob(jobId) {
      window.location.href = `applyJob.html?jobId=${jobId}`;
    }

    // View my applications
    async function viewMyApplications() {
      try {
        const response = await fetch(
          `http://localhost:3000/api/applications/student/${user.id}`
        );
        const data = await response.json();

        document.getElementById('sectionTitle').textContent = 'My Applications';

        const contentArea = document.getElementById('contentArea');

        if (data.applications && data.applications.length > 0) {
          contentArea.innerHTML = data.applications
            .map(
              (app) => `
            <div class="job-card">
              <div class="details">
                <span><strong>Job:</strong> ${app.jobTitle}</span>
                <span><strong>Status:</strong> <span style="color: ${getStatusColor(app.status)}">${app.status.toUpperCase()}</span></span>
                <span><strong>Applied:</strong> ${app.appliedDate || 'N/A'}</span>
              </div>
              <p style="margin-top: 10px; color: #666;"><strong>Company:</strong> ${app.company}</p>
              <p style="margin-top: 5px; color: #666;"><strong>Cover Letter:</strong> ${app.coverLetter || 'Not provided'}</p>
            </div>
          `
            )
            .join('');
        } else {
          contentArea.innerHTML =
            '<div class="empty-state"><p>You haven\'t applied for any jobs yet.</p></div>';
        }
      } catch (error) {
        document.getElementById('contentArea').innerHTML =
          '<div class="empty-state"><p>Error loading applications.</p></div>';
      }
    }

    // View applications for a job (recruiter)
    async function viewJobApplications(jobId) {
      try {
        const response = await fetch(
          `http://localhost:3000/api/applications/job/${jobId}`
        );
        const data = await response.json();

        document.getElementById('sectionTitle').textContent = 'Job Applications';

        const contentArea = document.getElementById('contentArea');

        if (data.applications && data.applications.length > 0) {
          contentArea.innerHTML = data.applications
            .map(
              (app) => `
            <div class="job-card">
              <h3>Application ID: ${app.id}</h3>
              <div class="details">
                <span><strong>Student:</strong> ${app.studentName}</span>
                <span><strong>Status:</strong> <span style="color: ${getStatusColor(app.status)}">${app.status.toUpperCase()}</span></span>
                <span><strong>Applied:</strong> ${app.appliedDate || 'N/A'}</span>
              </div>
              <p style="margin-top: 10px;"><strong>Cover Letter:</strong> ${app.coverLetter || 'Not provided'}</p>
              <div class="job-actions">
                <select class="btn" style="flex: 1; padding: 10px;" onchange="updateApplicationStatus(${app.id}, this.value)" style="color: #333;">
                  <option value="">Update Status</option>
                  <option value="applied">Applied</option>
                  <option value="under-review">Under Review</option>
                  <option value="accepted">Accepted</option>
                  <option value="rejected">Rejected</option>
                </select>
              </div>
            </div>
          `
            )
            .join('');
        } else {
          contentArea.innerHTML =
            '<div class="empty-state"><p>No applications for this job yet.</p></div>';
        }
      } catch (error) {
        document.getElementById('contentArea').innerHTML =
          '<div class="empty-state"><p>Error loading applications.</p></div>';
      }
    }

    // Update application status
    async function updateApplicationStatus(appId, newStatus) {
      if (!newStatus) return;

      try {
        const response = await fetch(
          `http://localhost:3000/api/applications/${appId}/status`,
          {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ newStatus: newStatus }),
          }
        );

        if (response.ok) {
          alert('Application status updated!');
          location.reload();
        } else {
          alert('Failed to update status');
        }
      } catch (error) {
        alert('Error updating status');
        console.error('Error:', error);
      }
    }

    // Get status color
    function getStatusColor(status) {
      switch (status) {
        case 'accepted':
          return '#28a745';
        case 'rejected':
          return '#dc3545';
        case 'under-review':
          return '#ffc107';
        default:
          return '#667eea';
      }
    }

    // Update profile
    function updateProfile() {
      const newResume = prompt('Enter your resume/profile information:');
      if (newResume) {
        fetch(`http://localhost:3000/api/users/profile/${user.id}/resume`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resume: newResume }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert('Profile updated successfully!');
            user.resume = newResume;
            localStorage.setItem('user', JSON.stringify(user));
          });
      }
    }

    // View applications (recruiter view)
    function viewApplications() {
      alert('This would show all applications for your posted jobs.');
    }

    // Logout function
    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      }
    }
  </script>
</body>
</html>
