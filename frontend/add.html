<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Application - Smart Internship & Job Tracker</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">CareerTrack</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link" data-page="dashboard">
                    <span class="nav-icon">📈</span>
                    <span>Dashboard</span>
                </a>
                <a href="add.html" class="nav-link active" data-page="add">
                    <span class="nav-icon">➕</span>
                    <span>Add Application</span>
                </a>
                <a href="profile.html" class="nav-link" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
                <a href="company.html" class="nav-link" data-page="company">
                    <span class="nav-icon">🏢</span>
                    <span>Company Dashboard</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn">
                    <span class="nav-icon">🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-content">
                <div class="header">
                    <div class="header-title">
                        <h1>Add New Application</h1>
                        <p class="header-subtitle">Track a new job application</p>
                    </div>
                </div>

                <!-- Add Application Form -->
                <div class="form-container">
                    <div class="card">
                        <form id="application-form" class="application-form">
                            <div class="form-group">
                                <label for="company-name">Company Name <span class="required">*</span></label>
                                <input type="text" id="company-name" name="companyName" placeholder="e.g., Google, Microsoft" required>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="job-role">Job Role <span class="required">*</span></label>
                                    <input type="text" id="job-role" name="jobRole" placeholder="e.g., Software Engineer Intern" required>
                                </div>

                                <div class="form-group">
                                    <label for="application-date">Application Date <span class="required">*</span></label>
                                    <input type="date" id="application-date" name="applicationDate" required>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="status">Status <span class="required">*</span></label>
                                    <select id="status" name="status" required>
                                        <option value="">Select Status</option>
                                        <option value="Applied">Applied</option>
                                        <option value="Interview">Interview</option>
                                        <option value="Offer">Offer</option>
                                        <option value="Rejected">Rejected</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="salary">Expected Salary (Optional)</label>
                                    <input type="text" id="salary" name="salary" placeholder="e.g., $50,000 - $60,000">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="notes">Notes (Optional)</label>
                                <textarea id="notes" name="notes" placeholder="Add any additional notes about this application..." rows="4"></textarea>
                            </div>

                            <div class="form-actions">
                                <a href="index.html" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Add Application</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
