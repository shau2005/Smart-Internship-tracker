<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerTrack - Smart Internship Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2563EB 0%, #1E40AF 50%, #1E3A8A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .splash-title {
            color: white;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .splash-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .splash-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .splash-description {
            color: #6B7280;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .splash-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .feature-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .feature-text {
            font-size: 13px;
            color: #1F2937;
            font-weight: 600;
        }

        .splash-button {
            display: inline-block;
            background-color: #2563EB;
            color: white;
            padding: 14px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .splash-button:hover {
            background-color: #1E40AF;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .splash-footer {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-top: 20px;
        }

        .loading-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 30px;
        }

        .loading-progress {
            height: 100%;
            background: white;
            animation: loading 3s ease-in-out infinite;
        }

        @keyframes loading {
            0% {
                width: 0%;
            }
            50% {
                width: 100%;
            }
            100% {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="splash-logo">📊</div>
        <h1 class="splash-title">CareerTrack</h1>
        <p class="splash-subtitle">Smart Internship & Job Tracker</p>

        <div class="splash-content">
            <p class="splash-description">
                Manage your internship journey and job applications efficiently. A complete platform for students and recruiters.
            </p>

            <div class="splash-features">
                <div class="feature">
                    <div class="feature-icon">📋</div>
                    <div class="feature-text">Track Applications</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">💼</div>
                    <div class="feature-text">Post Jobs</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">📅</div>
                    <div class="feature-text">Schedule Interviews</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">📊</div>
                    <div class="feature-text">View Analytics</div>
                </div>
            </div>

            <button class="splash-button" onclick="goToLogin()">Get Started</button>
            <div class="splash-footer">
                Loading your experience...
                <div class="loading-bar">
                    <div class="loading-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goToLogin() {
            window.location.href = 'login.html';
        }

        // Auto redirect to login after 4 seconds
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 4000);
    </script>
</body>
</html>
